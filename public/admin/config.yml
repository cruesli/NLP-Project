site_url: https://mtrecipes.netlify.app
display_url: "https://cruesli.github.io/recipes/"
backend:
  name: git-gateway
  branch: main

# Where Decap will store uploaded images in your repo:
media_folder: "public/images/recipes"
public_folder: "/images/recipes"

# Optional but recommended for local development
local_backend: true

collections:
  - name: "meta"
    label: "Meta"
    files:
      - label: "Cuisines"
        name: "cuisines"
        file: "src/content/meta/cuisines.json"
        format: "json"
        fields:
          - name: "cuisines"
            label: "Cuisines"
            widget: "list"
            allow_add: true
            fields:
              - { name: "slug", label: "Slug", widget: "string", hint: "lowercase + hyphens, e.g. italian, tex-mex, bbq" }
              - { name: "label", label: "Label (optional)", widget: "string", required: false, hint: "e.g. BBQ, Tex-Mex" }
  - name: "recipes"
    label: "Recipes"
    folder: "src/content/recipes"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - name: "cuisine"
        label: "Cuisine"
        widget: "relation"
        collection: "meta"
        file: "cuisines"
        search_fields: ["cuisines.*.slug", "cuisines.*.label"]
        value_field: "cuisines.*.slug"
        display_fields: ["cuisines.*.label", "cuisines.*.slug"]
      - { name: "foodType", label: "Food type", widget: "string", required: false }
      - { name: "tags", label: "Tags", widget: "list", required: false }
      - { name: "servings", label: "Servings", widget: "number", value_type: "int", required: false, min: 1 }
      - { name: "totalTimeMinutes", label: "Total time (minutes)", widget: "number", value_type: "int", required: false, min: 1 }
      - { name: "image", label: "Image", widget: "image", required: false }
      - { name: "ingredients", label: "Ingredients", widget: "markdown"}
      # Recipe body as markdown (keeps your current rendering intact)
      - { name: "body", label: "Recipe", widget: "markdown" }

  - name: "meal-plans"
    label: "Meal Plans"
    files:
      - label: "Current week"
        name: "current-week"
        file: "src/content/meal-plans/current-week.json"
        format: "json"
        fields:
          - { name: "weekStart", label: "Week start (YYYY-MM-DD)", widget: "string" }
          - name: "days"
            label: "Days"
            widget: "object"
            fields:
              - name: "monday"
                label: "Monday"
                widget: "object"
                fields:
                  - { name: "recipeSlug", label: "Recipe slug", widget: "string", required: false }
                  - { name: "notes", label: "Notes", widget: "string", required: false }
              - name: "tuesday"
                label: "Tuesday"
                widget: "object"
                fields:
                  - { name: "recipeSlug", label: "Recipe slug", widget: "string", required: false }
                  - { name: "notes", label: "Notes", widget: "string", required: false }
              - name: "wednesday"
                label: "Wednesday"
                widget: "object"
                fields:
                  - { name: "recipeSlug", label: "Recipe slug", widget: "string", required: false }
                  - { name: "notes", label: "Notes", widget: "string", required: false }
              - name: "thursday"
                label: "Thursday"
                widget: "object"
                fields:
                  - { name: "recipeSlug", label: "Recipe slug", widget: "string", required: false }
                  - { name: "notes", label: "Notes", widget: "string", required: false }
              - name: "friday"
                label: "Friday"
                widget: "object"
                fields:
                  - { name: "recipeSlug", label: "Recipe slug", widget: "string", required: false }
                  - { name: "notes", label: "Notes", widget: "string", required: false }
              - name: "saturday"
                label: "Saturday"
                widget: "object"
                fields:
                  - { name: "recipeSlug", label: "Recipe slug", widget: "string", required: false }
                  - { name: "notes", label: "Notes", widget: "string", required: false }
              - name: "sunday"
                label: "Sunday"
                widget: "object"
                fields:
                  - { name: "recipeSlug", label: "Recipe slug", widget: "string", required: false }
                  - { name: "notes", label: "Notes", widget: "string", required: false }
