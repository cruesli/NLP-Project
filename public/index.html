<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CMS Redirect</title>

    <!-- Needed so the widget can parse tokens if you ever land here -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <script>
      // Netlify Identity uses URL hashes like:
      //   #invite_token=...   (invites)
      //   #recovery_token=... (reset password)
      //   #confirmation_token=... (confirm email)
      // Redirect those to /admin/ while preserving the hash.
      (function () {
        const h = window.location.hash || "";
        const isIdentityToken =
          h.includes("invite_token=") ||
          h.includes("recovery_token=") ||
          h.includes("confirmation_token=") ||
          h.includes("access_token=");

        if (isIdentityToken) {
          window.location.replace("/admin/" + h);
        }
      })();
    </script>
  </head>
  <body>
    <p>
      If you are not redirected automatically, open the CMS here:
      <a href="/admin/">/admin/</a>
    </p>
  </body>
</html>
